<!DOCTYPE html>

    <style>

<body class="min-h-screen bg-slate-50 text-gray-800 font-sans pb-12">

    <!-- Header -->

                    <p class="text-sm text-gray-500 font-medium mt-1">Comprehensive Vocabulary & Structures</p>

            </div>
            
            <!-- Tabs -->
            <div class="flex overflow-x-auto mt-6 border-b border-gray-200 hide-scrollbar gap-2 sm:gap-6">
                <button onclick="switchTab('man-made')" id="tab-btn-man-made" class="whitespace-nowrap pb-4 px-2 text-sm sm:text-base font-bold text-teal-600 border-b-2 border-teal-600 transition-colors flex items-center gap-2">
                    <i data-lucide="factory" class="w-4 h-4"></i> Man-made Process
                </button>
                <button onclick="switchTab('natural')" id="tab-btn-natural" class="whitespace-nowrap pb-4 px-2 text-sm sm:text-base font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors flex items-center gap-2">
                    <i data-lucide="leaf" class="w-4 h-4"></i> Natural Process
                </button>
                <button onclick="switchTab('synonyms')" id="tab-btn-synonyms" class="whitespace-nowrap pb-4 px-2 text-sm sm:text-base font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors flex items-center gap-2">

                    <i data-lucide="map" class="w-4 h-4"></i> Map Structures

        </div>
    </header>

    <!-- Main Content -->

        <!-- Tab: Man-made Process -->
        <section id="tab-man-made" class="animate-fade-in block">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <i data-lucide="list" class="w-5 h-5 text-teal-500"></i> Vocabulary
                        </h2>
                        <div class="relative">
                            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" onkeyup="filterList('man-made-list', this.value)" placeholder="Search words..." class="pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                        </div>
                    </div>
                    <ul id="man-made-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">

                    </ul>
                </div>
                <div class="md:w-1/3 bg-teal-50 p-6 rounded-2xl border border-teal-100 h-fit sticky top-48">
                    <h2 class="text-xl font-bold text-teal-900 mb-6 flex items-center gap-2">
                        <i data-lucide="message-square" class="w-5 h-5 text-teal-600"></i> Examples

                    <div id="man-made-examples" class="space-y-6">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Tab: Natural Process -->
        <section id="tab-natural" class="animate-fade-in hidden">
            <div class="flex flex-col md:flex-row gap-6">
                <div class="flex-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                            <i data-lucide="list" class="w-5 h-5 text-teal-500"></i> Vocabulary
                        </h2>
                        <div class="relative">
                            <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" onkeyup="filterList('natural-list', this.value)" placeholder="Search words..." class="pl-9 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all">
                        </div>
                    </div>
                    <ul id="natural-list" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">
                        <!-- Populated by JS -->
                    </ul>
                </div>
                <div class="md:w-1/3 bg-teal-50 p-6 rounded-2xl border border-teal-100 h-fit sticky top-48">
                    <h2 class="text-xl font-bold text-teal-900 mb-6 flex items-center gap-2">
                        <i data-lucide="message-square" class="w-5 h-5 text-teal-600"></i> Examples
                    </h2>
                    <div id="natural-examples" class="space-y-6">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </section>

        <!-- Tab: Synonyms -->
        <section id="tab-synonyms" class="animate-fade-in hidden">
            <div class="bg-white p-6 sm:p-8 rounded-2xl shadow-sm border border-gray-100">
                <div class="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <h2 class="text-xl font-bold text-gray-800">Common Synonyms & Paraphrases</h2>

                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="synonyms-grid">
                    <!-- Populated by JS -->
                </div>
            </div>
        </section>

        <!-- Tab: Maps -->

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6" id="maps-grid">
                <!-- Populated by JS -->
            </div>
        </section>

    </main>

        const synonymsData = [
            { id: 1, base: "the 0 to 14 age group", syn: "children aged 14 or under = the youngest group", vi: "nhóm tuổi từ 0 tới 14" },
            { id: 2, base: "the 30 to 50 age group", syn: "people aged 30 to 50 = people between the ages of 30 and 50", vi: "nhóm tuổi từ 30 tới 50" },

            {

                title: "Sự thay đổi: Bị thay thế (Replacement)",
                icon: "refresh-cw",
                structures: [
                    "Nơi cũ + to be + demolished // destroyed // knocked down + to make way for + nơi mới.",
                    "Nơi cũ + to be + demolished // destroyed // knocked down + and replaced by + nơi mới.",
                    "Nơi mới + to be + built / constructed // erected + to replace + nơi cũ.",
                    "Nơi mới + to be + built / constructed // erected + on the original site of + nơi cũ."
                ],
                examples: [
                    "The school was demolished to make way for a new science block.",
                    "The school was demolished and replaced by a new science block.",
                    "A new science block was built to replace the school.",
                    "A new science block was built on the original site of the school."
                ]
            }
        ];

        // --- RENDERING FUNCTIONS ---

        function renderVocabList(containerId, dataObj) {
            const container = document.getElementById(containerId);
            container.innerHTML = dataObj.vocab.map(item => `
                <li class="p-4 bg-gray-50 hover:bg-teal-50 border border-gray-100 hover:border-teal-200 rounded-xl transition-colors group">
                    <div class="font-semibold text-lg text-gray-800 group-hover:text-teal-700">${item.en}</div>
                    <div class="text-sm text-gray-500 mt-1">${item.vi}</div>
                </li>
            `).join('');
        }

        function renderExamples(containerId, dataObj) {
            const container = document.getElementById(containerId);
            container.innerHTML = dataObj.examples.map(ex => `
                <div class="bg-white p-4 rounded-xl shadow-sm border border-teal-100 relative">
                    <div class="absolute -left-3 top-4 w-6 h-6 bg-teal-100 rounded-full border-4 border-white flex items-center justify-center"><div class="w-2 h-2 bg-teal-500 rounded-full"></div></div>
                    <p class="font-medium text-gray-800 text-sm md:text-base leading-relaxed ml-2">${ex.en}</p>
                    <p class="text-sm text-teal-600/80 mt-2 ml-2 italic pb-1 border-b border-teal-50">${ex.vi}</p>
                </div>
            `).join('');
        }

        function renderSynonyms() {
            const container = document.getElementById('synonyms-grid');
            container.innerHTML = synonymsData.map(item => `
                <div class="synonym-card bg-gray-50 p-5 rounded-xl border border-gray-200 hover:border-teal-300 hover:shadow-md transition-all">
                    <div class="flex items-center gap-2 mb-2 text-xs font-bold text-gray-400 uppercase tracking-wider">
                        <span>Phrase ${item.id}</span>
                    </div>
                    <div class="flex flex-col gap-3">
                        <div class="font-semibold text-gray-900 bg-white p-3 rounded-lg border border-gray-100">${item.base}</div>
                        <div class="flex justify-center text-teal-500"><i data-lucide="arrow-down-up" class="w-4 h-4"></i></div>
                        <div class="font-semibold text-teal-700 bg-teal-50 p-3 rounded-lg border border-teal-100">${item.syn}</div>
                        <div class="text-sm text-gray-500 italic text-center mt-1">${item.vi}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderMaps() {
            const container = document.getElementById('maps-grid');
            container.innerHTML = mapData.map(item => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
                    <div class="bg-slate-800 px-5 py-4 border-b border-gray-100 flex items-center gap-3">
                        <div class="p-2 bg-slate-700 rounded-lg text-slate-300">
                            <i data-lucide="${item.icon}" class="w-5 h-5"></i>
                        </div>
                        <h3 class="font-bold text-lg text-white">${item.title}</h3>
                    </div>
                    <div class="p-5">
                        ${item.desc ? `<p class="text-sm text-gray-500 mb-4 bg-gray-50 p-3 rounded-lg border border-gray-100">${item.desc}</p>` : ''}
                        
                        <div class="mb-4">
                            <h4 class="text-xs font-bold text-teal-600 uppercase tracking-wider mb-2">Cấu trúc (Structures)</h4>
                            <ul class="space-y-2">
                                ${item.structures.map(s => `
                                    <li class="flex items-start gap-2 text-sm bg-teal-50/50 p-3 rounded-lg border border-teal-100/50">
                                        <i data-lucide="check-circle-2" class="w-4 h-4 text-teal-500 mt-0.5 shrink-0"></i>
                                        <span class="font-medium text-gray-700">${highlightFormula(s)}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>

                        <div>
                            <h4 class="text-xs font-bold text-indigo-600 uppercase tracking-wider mb-2">Ví dụ (Examples)</h4>
                            <div class="space-y-2">
                                ${item.examples.map(ex => `
                                    <div class="text-sm italic text-gray-600 border-l-2 border-indigo-200 pl-3 py-1">${ex}</div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Helper to colorize structural parts
        function highlightFormula(text) {
            return text.replace(/\+/g, '<span class="text-teal-400 mx-1">+</span>')
                       .replace(/\/\//g, '<span class="text-gray-300 mx-1">/</span>');
        }

        // --- INTERACTIVITY LOGIC ---

        function switchTab(tabId) {
            // Hide all tabs
            const tabs = ['man-made', 'natural', 'synonyms', 'maps'];
            tabs.forEach(id => {
                document.getElementById(`tab-${id}`).classList.add('hidden');
                document.getElementById(`tab-${id}`).classList.remove('block');
                
                // Reset tab button styles
                const btn = document.getElementById(`tab-btn-${id}`);
                btn.className = "whitespace-nowrap pb-4 px-2 text-sm sm:text-base font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-700 transition-colors flex items-center gap-2";
            });

            // Show active tab
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('block');
            
            // Set active tab button style
            const activeBtn = document.getElementById(`tab-btn-${tabId}`);
            activeBtn.className = "whitespace-nowrap pb-4 px-2 text-sm sm:text-base font-bold text-teal-600 border-b-2 border-teal-600 transition-colors flex items-center gap-2";
        }

        function filterList(listId, query) {
            const list = document.getElementById(listId);
            const items = list.getElementsByTagName('li');
            const lowerQuery = query.toLowerCase();

            for (let i = 0; i < items.length; i++) {
                const text = items[i].innerText.toLowerCase();
                if (text.includes(lowerQuery)) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }

        function filterSynonyms(query) {
            const cards = document.getElementsByClassName('synonym-card');
            const lowerQuery = query.toLowerCase();

            for (let i = 0; i < cards.length; i++) {
                const text = cards[i].innerText.toLowerCase();
                if (text.includes(lowerQuery)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            renderVocabList('man-made-list', manMadeData);
            renderExamples('man-made-examples', manMadeData);
            
            renderVocabList('natural-list', naturalData);
            renderExamples('natural-examples', naturalData);
            
            renderSynonyms();
            renderMaps();
            
            lucide.createIcons();
        });
    </script>
</body>
</html>
